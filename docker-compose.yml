services:
  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - "3000:3000"
    # Variables perso (SMTP…) lues depuis backend/.env ; la section environment garde priorité
    env_file:
      - ./backend/.env
    environment:
      PORT: 3000
      NODE_ENV: development
      TRUST_PROXY_HOPS: 0
      DATABASE_URL: postgresql://myactivities:myactivities@postgres:5432/myactivities
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev_access_secret_change_in_prod
      JWT_REFRESH_SECRET: dev_refresh_secret_change_in_prod
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      AUTH_RATE_LIMIT_MAX: 5
      AUTH_RATE_LIMIT_WINDOW_MS: 900000
      CORS_ORIGIN: http://localhost:8081
      APP_URL: http://localhost:3000
    volumes:
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: myactivities
      POSTGRES_PASSWORD: myactivities
      POSTGRES_DB: myactivities
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myactivities -d myactivities"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
