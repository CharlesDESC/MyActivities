name: Mobile

on:
  push:
    branches: [main]
    paths:
      - 'myActivities/**'
      - '.github/workflows/mobile.yml'
  pull_request:
    branches: [main]
    paths:
      - 'myActivities/**'
  workflow_dispatch:
    inputs:
      platform:
        description: Plateforme cible
        required: true
        default: all
        type: choice
        options: [all, ios, android]
      profile:
        description: Profil EAS
        required: true
        default: preview
        type: choice
        options: [development, preview, production]

jobs:
  ci:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: myActivities

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: myActivities/package-lock.json

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npm test -- --ci --coverage

  eas-update:
    name: OTA Update → EAS
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: myActivities

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: myActivities/package-lock.json

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Publish OTA update
        run: eas update --auto --non-interactive

  # Déclenché manuellement (Actions → Run workflow) — build store ~20 min
  eas-build:
    name: Build → EAS (${{ github.event.inputs.platform }})
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: myActivities

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: myActivities/package-lock.json

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: EAS Build
        run: eas build --platform ${{ github.event.inputs.platform }} --profile ${{ github.event.inputs.profile }} --non-interactive
