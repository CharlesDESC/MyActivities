name: Mobile

on:
  push:
    branches: [main]
    paths:
      - 'myActivities/**'
      - '.github/workflows/mobile.yml'
  pull_request:
    branches: [main]
    paths:
      - 'myActivities/**'
  workflow_dispatch:
    inputs:
      platform:
        description: Plateforme cible
        required: true
        default: android
        type: choice
        options: [android, ios, all]
      profile:
        description: Profil EAS
        required: true
        default: preview
        type: choice
        options: [development, preview, production]

jobs:
  ci:
    name: Lint + Typecheck + Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: myActivities

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: myActivities/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npx jest --ci --coverage

  # Après un push sur main, soumet par défaut une build Android "preview".
  # Le job reste facultatif : son échec ne bloque ni la CI ni le workflow global.
  # Le déclenchement manuel permet de choisir une autre plateforme ou un autre profil.
  eas-build:
    name: Submit EAS Build (optional)
    runs-on: ubuntu-latest
    needs: ci
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    continue-on-error: true
    defaults:
      run:
        working-directory: myActivities

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: myActivities/package-lock.json

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Submit EAS Build (no wait)
        run: >-
          eas build
          --platform ${{ github.event.inputs.platform || 'android' }}
          --profile ${{ github.event.inputs.profile || 'preview' }}
          --non-interactive
          --no-wait
